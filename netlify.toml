[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  # Functions 打包会引用该环境变量，避免密钥扫描误杀构建
  SECRETS_SCAN_OMIT_KEYS = "DASHSCOPE_API_KEY"

[functions]
  node_bundler = "esbuild"
  included_files = ["plugins/tongyiHandlers.mjs"]

# 前端仍请求 /api/chat、/api/review，转发到 Functions
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200
  force = true

[[redirects]]
  from = "/api/review"
  to = "/.netlify/functions/review"
  status = 200
  force = true

# SPA 回退
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
