[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  # Functions 会注入百炼 Key；关闭扫描避免误杀（Key 仍只存在于 Netlify 环境变量，不进仓库）
  SECRETS_SCAN_ENABLED = "false"

[functions]
  node_bundler = "esbuild"
  included_files = ["plugins/tongyiHandlers.mjs"]

# 前端仍请求 /api/chat、/api/review，转发到 Functions
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200
  force = true

[[redirects]]
  from = "/api/review"
  to = "/.netlify/functions/review"
  status = 200
  force = true

# SPA 回退
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
